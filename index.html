<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber OS - Gaming Hub</title>
    <link rel="stylesheet" href="style.css?v=5">
</head>
<body>

    <div id="boot-screen" class="screen">
            <div class="boot-card">
                <h1>🚀 CYBER OS v2.0 - GAMING HUB</h1>
                <p id="boot-subtitle">Welcome, Space Cadet!</p>
                <div class="boot-input-row">
                    <input type="text" id="username-input" placeholder="Enter your username..." maxlength="20">
                </div>
                <div class="boot-input-row" style="margin-top:8px;">
                    <div id="emoji-tray" class="icon-tray"></div>
                </div>
                <div id="boot-status" style="margin-top:8px;font-size:0.8rem;color:#ff6666;min-height:1.2em;"></div>
                <button id="boot-btn">SIGN IN</button>
            </div>
    </div>

    <div id="desktop" class="screen hidden">
        <canvas id="matrix-canvas"></canvas>
        <div id="mk-watermark" aria-hidden="true">MK</div>

        <div id="desktop-icons"></div>
        <div id="context-menu" class="context-menu hidden"></div>
        <div id="start-menu" class="start-menu hidden"></div>
        <div id="alt-tab-overlay" class="hidden"><div id="alt-tab-grid"></div></div>

        <!-- Snap layouts menu -->
        <div id="snap-layout-menu" class="hidden"></div>

        <!-- Emoji Picker -->
        <div id="emoji-picker" class="hidden"></div>

        <!-- Toast notifications container -->
        <div id="toast-container"></div>

        <!-- Calendar flyout -->
        <div id="calendar-flyout" class="flyout hidden"></div>

        <!-- Action Center -->
        <div id="action-center" class="flyout hidden"></div>

        <!-- Battery flyout -->
        <div id="battery-flyout" class="flyout hidden"></div>

        <!-- Network flyout -->
        <div id="network-flyout" class="flyout hidden"></div>

        <!-- Volume mixer flyout -->
        <div id="volume-flyout" class="flyout hidden"></div>

        <!-- Power User Menu -->
        <div id="power-user-menu" class="pum hidden"></div>

        <!-- Top-Right Widgets -->
        <div id="top-widgets">
            <div id="tw-clock"></div>
            <div id="tw-calendar"></div>
            <div id="tw-media"></div>
        </div>

        <div id="taskbar">
            <span class="logo profile-logo" id="username-display"></span>
            <div id="profile-menu" class="profile-menu hidden">
                <button data-action="lock">🔒 Lock</button>
                <button data-action="signout">🚪 Sign Out</button>
                <div class="profile-separator"></div>
                <button data-action="restart">🔄 Restart</button>
                <button data-action="shutdown">⏻ Shutdown</button>
            </div>

            <!-- Search bar -->
            <div id="taskbar-search">
                <span>🔍</span>
                <input type="text" id="search-input" placeholder="Search apps..." maxlength="50">
                <div id="search-results" class="hidden"></div>
            </div>

            <div class="taskbar-buttons">
                <span class="taskbar-separator"></span>
            </div>
            <div id="system-tray">
                <span class="tray-icon" id="tray-nightlight" title="Night Light">🌙</span>
                <span class="tray-icon" id="tray-network" title="Network Status">📶</span>
                <span class="tray-icon" id="tray-volume" title="Volume">🔊</span>
                <span class="tray-icon" id="tray-battery" title="Battery">🔋</span>
                <span class="tray-icon" id="tray-action-center" title="Action Center">💬</span>
                <span class="tray-icon" id="tray-overflow-btn" title="Hidden icons">^</span>
            </div>
            <div id="tray-overflow" class="hidden"></div>
        <div id="show-desktop-btn"></div>
        <div id="taskbar-preview"></div>
        <span id="clock" title="Click for calendar">00:00 AM</span>
        </div>

    </div>

    <!-- Bongo Cat (outside #desktop so it's always in the DOM) -->
    <div id="bongo-cat">
        <div id="bongo-key-display">🄰</div>
        <div class="bongo-body">
            <div class="bongo-paw bongo-paw-left">🐾</div>
            <div class="bongo-face">🐱</div>
            <div class="bongo-paw bongo-paw-right">🐾</div>
        </div>
        <div class="bongo-desk">▔▔▔</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="script.js?v=14"></script>
</body>
</html>
